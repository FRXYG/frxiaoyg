<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>好评文案</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#FAFAFA;color:#171717;min-height:100vh;}
.filter-tab{position:relative;white-space:nowrap;padding:8px 16px;font-size:14px;color:#737373;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent;}
.filter-tab.active{color:#F97316;font-weight:600;}
.filter-tab.active::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2px;background:#F97316;border-radius:1px;}
.no-scrollbar::-webkit-scrollbar{display:none;}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
@keyframes card-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.copy-card{animation:card-in 0.35s ease-out both;}
.btn-copy:active{transform:scale(0.96);opacity:0.9;}
.img-grid{display:flex;gap:8px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch;}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:12px 28px;border-radius:9999px;font-size:15px;z-index:2000;opacity:0;transition:opacity 0.3s;pointer-events:none;background:rgba(0,0,0,0.8);color:#fff;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<header style="position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #E5E5E5;display:flex;align-items:center;justify-content:center;height:48px;padding:0 16px;padding-top:env(safe-area-inset-top,0);">
    <h1 style="font-size:16px;font-weight:600;">好评文案</h1>
</header>
<section style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60px;background:linear-gradient(180deg,#FFF7ED 0%,#fff 100%);padding:0 16px;text-align:center;">
    <p style="font-size:12px;color:#737373;">选择好评文案，一键复制去评价</p>
</section>
<nav style="position:sticky;top:48px;z-index:40;background:#fff;border-bottom:1px solid #E5E5E5;" class="no-scrollbar">
    <div style="display:flex;overflow-x:auto;padding:0 12px;" class="no-scrollbar" id="filterTabs">
        <button class="filter-tab active" data-cat="全部">全部</button>
        <button class="filter-tab" data-cat="口味好评">口味</button>
        <button class="filter-tab" data-cat="环境好评">环境</button>
        <button class="filter-tab" data-cat="服务好评">服务</button>
        <button class="filter-tab" data-cat="性价比好评">性价比</button>
        <button class="filter-tab" data-cat="综合好评">综合</button>
    </div>
</nav>
<main style="padding:12px 16px 24px;" id="copyCards">
    
        <div class="copy-card" style="background:#fff;border:1px solid #F5F5F5;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,0.04);">
            
            
            <h3 style="font-size:16px;font-weight:600;margin-bottom:6px;">111</h3>
            <p style="font-size:14px;line-height:1.7;color:#374151;margin-bottom:10px;white-space:pre-wrap;">111</p>
            <div style="margin-bottom:10px;"><span style="display:inline-block;padding:3px 10px;border-radius:9999px;font-size:12px;background:#FFF7ED;color:#F97316;margin-right:6px;">美团</span></div>
            <div style="display:flex;align-items:center;justify-content:space-between;">
                <span style="font-size:12px;color:#A3A3A3;">已复制 0 次</span>
                <button class="btn-copy" data-text="111" style="display:inline-flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;padding:8px 20px;border-radius:9999px;background:#F97316;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all 0.15s;">一键复制</button>
            </div>
        </div>
</main>
<div id="toast" class="toast"></div>
<script>
var allCards = document.querySelectorAll('.copy-card');
var currentFilter = '全部';

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show';
    setTimeout(function(){ t.className = 'toast'; }, 2000);
}

function filterCards() {
    allCards.forEach(function(card) {
        var p = card.querySelector('p');
        var text = p ? p.textContent : '';
        var match = currentFilter === '全部' || text.indexOf(currentFilter) >= 0;
        card.style.display = match ? '' : 'none';
    });
}

document.getElementById('filterTabs').addEventListener('click', function(e) {
    if (e.target.classList.contains('filter-tab')) {
        document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
        e.target.classList.add('active');
        currentFilter = e.target.dataset.cat;
        filterCards();
    }
});

document.querySelectorAll('.btn-copy').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var text = this.dataset.text;
        var ta = document.createElement('textarea');
        ta.innerHTML = text;
        text = ta.value;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
                showToast('文案已复制到剪贴板');
            }).catch(function() {
                fallbackCopy(text);
            });
        } else {
            fallbackCopy(text);
        }
    });
});

function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); showToast('文案已复制到剪贴板'); }
    catch(e) { showToast('复制失败，请手动选择文字复制'); }
    document.body.removeChild(ta);
}

function saveImage(img) {
    var a = document.createElement('a');
    a.href = img.src;
    a.download = 'haoping_img.jpg';
    a.click();
    showToast('图片已保存');
}
</script>
</body>
</html>
