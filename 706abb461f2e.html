<script>
function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show';
    setTimeout(function(){ t.className = 'toast'; }, 2000);
}

function isWechatBrowser() {
    var ua = navigator.userAgent.toLowerCase();
    return ua.indexOf('micromessenger') !== -1;
}

if (isWechatBrowser()) {
    document.getElementById('wechatTip').style.display = 'block';
}

document.querySelectorAll('.btn-copy').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var text = this.dataset.text;
        var ta = document.createElement('textarea');
        ta.innerHTML = text;
        text = ta.value;
        var card = this.closest('.copy-card');
        var imgs = card.querySelectorAll('.img-grid img');
        var imgCount = imgs.length;
        var isWechat = isWechatBrowser();

        if (isWechat) {
            document.getElementById('wechatText').value = text;
            document.getElementById('wechatModal').style.display = 'flex';
            var wechatText = document.getElementById('wechatText');
            wechatText.focus();
            wechatText.select();
            if (imgCount > 0) {
                setTimeout(function() { showToast('请长按文字复制，长按图片保存'); }, 500);
            }
        } else {
            function doCopy() {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text).catch(function() { fallbackCopy(text); });
                } else {
                    fallbackCopy(text);
                    return Promise.resolve();
                }
            }

            function saveImages() {
                imgs.forEach(function(img, i) {
                    setTimeout(function() {
                        var a = document.createElement('a');
                        a.href = img.src;
                        a.download = 'haoping_' + (i+1) + '.jpg';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    }, i * 300);
                });
            }

            doCopy().then(function() {
                if (imgCount > 0) {
                    saveImages();
                    showToast('文案已复制，' + imgCount + '张图片已保存');
                } else {
                    showToast('文案已复制到剪贴板');
                }
            });
        }
    });
});

function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); showToast('文案已复制到剪贴板'); }
    catch(e) { showToast('复制失败，请手动选择文字复制'); }
    document.body.removeChild(ta);
}

function saveImage(img) {
    if (isWechatBrowser()) {
        showToast('长按图片即可保存');
    } else {
        var a = document.createElement('a');
        a.href = img.src;
        a.download = 'haoping_img.jpg';
        a.click();
        showToast('图片已保存');
    }
}
</script>
</body>
</html>
